<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Esslay Idle Camp</title>
    <link rel="stylesheet" href="idle.css">
  </head>
  <body>
    <main class="idle-shell">
      <section class="idle-card" aria-labelledby="idle-title">
        <header class="idle-header">
          <div>
            <p class="eyebrow">Esslay</p>
            <h1 id="idle-title">Idle Camp</h1>
            <p class="intro">Your character waits outside home before the quest day begins.</p>
          </div>
          <div class="status-box">
            <span id="season-label">Season</span>
            <span id="time-label">Time</span>
            <span><strong id="xp-label">0</strong> XP</span>
          </div>
        </header>

        <div class="scene-frame" aria-label="Seasonal pixel scene">
          <div id="sky-particles" class="sky-particles" aria-hidden="true"></div>
          <div class="sun-moon" aria-hidden="true"></div>
          <div class="tree tree-left" aria-hidden="true">
            <span class="trunk"></span>
            <span class="tree-top"></span>
          </div>
          <div class="tree tree-right" aria-hidden="true">
            <span class="trunk"></span>
            <span class="tree-top"></span>
          </div>

          <div id="home" class="home peasant" aria-label="Upgradeable medieval home">
            <div class="chimney"></div>
            <div class="roof"></div>
            <div class="walls">
              <div class="window left-window"></div>
              <div class="door"></div>
              <div class="window right-window"></div>
            </div>
            <div class="house-shadow"></div>
          </div>

          <div class="avatar" aria-label="Player character">
            <div class="hair back-hair"></div>
            <div class="head">
              <span class="eye left-eye"></span>
              <span class="eye right-eye"></span>
            </div>
            <div class="hair fringe"></div>
            <div class="body">
              <div class="bodice"></div>
              <div class="skirt"></div>
            </div>
            <div class="arm left-arm"></div>
            <div class="arm right-arm"></div>
            <div class="leg left-leg"></div>
            <div class="leg right-leg"></div>
          </div>

          <div class="ground"></div>
        </div>

        <footer class="idle-footer">
          <div>
            <h2 id="home-tier">Peasant cottage</h2>
            <p id="home-note">Earn XP to make the home warmer, richer, and more magical.</p>
          </div>
          <a class="begin-button" href="hub.html">Begin</a>
        </footer>
      </section>
    </main>

    <script src="idle.js"></script>
  </body>
</html>
