<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Esslay Idle Camp</title>
    <link rel="stylesheet" href="idle.css?v=2">
    <link rel="stylesheet" href="idle-scene.css?v=3">
  </head>
  <body>
    <main class="idle-shell">
      <section class="idle-card" aria-labelledby="idle-title">
        <header class="idle-header">
          <div>
            <p class="eyebrow">Esslay</p>
            <h1 id="idle-title">Idle Camp</h1>
            <p class="intro">Your academic adventurer waits outside home before the quest day begins.</p>
          </div>
          <div class="status-box">
            <span id="season-label">Season</span>
            <span id="time-label">Time</span>
            <span><strong id="xp-label">0</strong> XP</span>
          </div>
        </header>

        <div class="scene-frame solid-scene reference-idle-scene" aria-label="Seasonal idle scene">
          <img id="home" class="scene-background" src="assets/idle-reference-scene.svg?v=1" alt="Cottage with academic adventurer standing outside">
          <div id="sky-particles" class="sky-particles" aria-hidden="true"></div>
        </div>

        <footer class="idle-footer">
          <div>
            <h2 id="home-tier">Peasant cottage</h2>
            <p id="home-note">Earn XP to make the home warmer, richer, and more magical.</p>
          </div>
          <a class="begin-button" href="hub.html">Begin</a>
        </footer>
      </section>
    </main>

    <script src="idle.js?v=2"></script>
  </body>
</html>
