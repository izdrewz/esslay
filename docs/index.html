<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Esslay Idle Camp</title>
    <link rel="stylesheet" href="idle.css">
  </head>
  <body>
    <main class="idle-shell">
      <section class="idle-card" aria-labelledby="idle-title">
        <header class="idle-header">
          <div>
            <p class="eyebrow">Esslay</p>
            <h1 id="idle-title">Idle Camp</h1>
            <p class="intro">Your academic adventurer waits outside home before the quest day begins.</p>
          </div>
          <div class="status-box">
            <span id="season-label">Season</span>
            <span id="time-label">Time</span>
            <span><strong id="xp-label">0</strong> XP</span>
          </div>
        </header>

        <div class="scene-frame" aria-label="Seasonal pixel scene">
          <div id="sky-particles" class="sky-particles" aria-hidden="true"></div>
          <div class="sun-moon" aria-hidden="true"></div>

          <img id="tree-left" class="tree-art tree-left" src="assets/tree-pink.svg" alt="">
          <img id="tree-right" class="tree-art tree-right" src="assets/tree-pink.svg" alt="">

          <img id="home" class="home-art" src="assets/house-peasant.svg" alt="Upgradeable medieval home">
          <img id="avatar" class="avatar-art" src="assets/academic-adventurer.svg" alt="Blonde academic adventurer character">

          <div class="ground"></div>
        </div>

        <footer class="idle-footer">
          <div>
            <h2 id="home-tier">Peasant cottage</h2>
            <p id="home-note">Earn XP to make the home warmer, richer, and more magical.</p>
          </div>
          <a class="begin-button" href="hub.html">Begin</a>
        </footer>
      </section>
    </main>

    <script src="idle.js"></script>
  </body>
</html>
