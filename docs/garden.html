<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Esslay XP Garden</title>
    <link rel="stylesheet" href="room-viewport.css?v=1">
    <link rel="stylesheet" href="garden.css?v=3">
  </head>
  <body data-room-id="garden" data-room-viewport-active="true">
    <main
      class="room-viewport-shell garden-shell"
      data-room-viewport
      data-room-id="garden"
      data-room-aspect="1.7777777778"
      data-room-max-width="1540"
      data-room-safe-bottom="84"
      data-room-default-scale="0.86"
    >
      <section class="room-viewport-frame garden-room" data-room-viewport-frame aria-label="XP Garden room">
        <img
          id="garden-room-image"
          class="room-viewport-art garden-room-image"
          src="assets/rooms/garden/xp-garden-stage-01-newly-planted.jpg?v=1"
          alt="Cliffside XP Garden terrace with a newly planted magical sapling"
        >

        <header class="garden-topbar">
          <div>
            <p class="garden-eyebrow">Esslay</p>
            <h1>XP Garden</h1>
          </div>
          <nav class="garden-nav" aria-label="Garden navigation">
            <a href="house.html">Home Base</a>
            <a href="cave.html">Study Cave</a>
          </nav>
        </header>

        <section class="garden-progress-card" aria-live="polite">
          <p class="garden-eyebrow">Tree progress</p>
          <h2 id="garden-stage-label">Stage 1 — Newly planted</h2>
          <p><strong id="garden-xp-value">0</strong> XP</p>
          <p id="garden-stage-note">Every saved progress point helps the tree grow.</p>
        </section>
      </section>
    </main>

    <script src="room-viewport.js?v=1"></script>
    <script src="garden.js?v=1"></script>
  </body>
</html>
