<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9b98b"/>
      <stop offset="1" stop-color="#b98356"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a5c38"/>
      <stop offset="1" stop-color="#5c3926"/>
    </linearGradient>
    <pattern id="timber" width="90" height="90" patternUnits="userSpaceOnUse">
      <rect width="90" height="90" fill="transparent"/>
      <rect x="0" y="0" width="10" height="90" fill="#5c3926" opacity=".8"/>
      <rect x="0" y="0" width="90" height="8" fill="#5c3926" opacity=".45"/>
    </pattern>
    <pattern id="planks" width="96" height="96" patternUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="transparent"/>
      <path d="M0 20h96M0 52h96M0 84h96" stroke="#3d271b" stroke-width="4" opacity=".65"/>
      <path d="M24 20v32M68 52v32" stroke="#3d271b" stroke-width="3" opacity=".5"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="#251a17"/>
  <rect x="0" y="0" width="1280" height="440" fill="url(#wall)"/>
  <rect x="0" y="0" width="1280" height="440" fill="url(#timber)" opacity=".7"/>
  <rect x="0" y="440" width="1280" height="280" fill="url(#floor)"/>
  <rect x="0" y="440" width="1280" height="280" fill="url(#planks)"/>

  <!-- back wall beams -->
  <rect x="0" y="414" width="1280" height="26" fill="#4d3022"/>
  <rect x="70" y="0" width="24" height="440" fill="#4d3022"/>
  <rect x="1186" y="0" width="24" height="440" fill="#4d3022"/>
  <rect x="0" y="74" width="1280" height="18" fill="#6b422c" opacity=".75"/>

  <!-- small window -->
  <g transform="translate(760 96)">
    <rect x="0" y="0" width="230" height="150" fill="#4d3022"/>
    <rect x="16" y="16" width="198" height="118" fill="#9fd4fb"/>
    <path d="M115 16v118M16 75h198" stroke="#4d3022" stroke-width="10"/>
    <path d="M16 16h198v118H16z" fill="none" stroke="#2d2118" stroke-width="8"/>
    <rect x="-18" y="134" width="266" height="18" fill="#5c3926"/>
  </g>

  <!-- bed -->
  <g transform="translate(90 330)">
    <rect x="0" y="70" width="330" height="126" fill="#4d3022"/>
    <rect x="26" y="24" width="268" height="100" fill="#d9c5ac"/>
    <rect x="36" y="34" width="120" height="50" fill="#fff0d2"/>
    <rect x="160" y="34" width="124" height="72" fill="#836b8f"/>
    <rect x="0" y="0" width="32" height="210" fill="#4d3022"/>
    <rect x="300" y="0" width="32" height="210" fill="#4d3022"/>
  </g>

  <!-- desk -->
  <g transform="translate(880 356)">
    <rect x="0" y="52" width="250" height="36" fill="#4d3022"/>
    <rect x="18" y="88" width="24" height="118" fill="#3a2419"/>
    <rect x="208" y="88" width="24" height="118" fill="#3a2419"/>
    <rect x="62" y="10" width="120" height="42" fill="#fff1c8"/>
    <rect x="82" y="22" width="80" height="8" fill="#8c6241"/>
    <rect x="188" y="8" width="20" height="42" fill="#e7b85a"/>
    <ellipse cx="198" cy="0" rx="18" ry="10" fill="#ffdc83" opacity=".85"/>
  </g>

  <!-- mirror -->
  <g transform="translate(554 120)">
    <rect x="0" y="0" width="150" height="238" rx="22" fill="#3a2419"/>
    <rect x="16" y="18" width="118" height="192" rx="20" fill="#bde8f2"/>
    <path d="M34 42c32-20 68-20 92 0v126c-28 22-70 22-92 0z" fill="#e6fbff" opacity=".55"/>
    <rect x="44" y="214" width="62" height="24" fill="#4d3022"/>
  </g>

  <!-- shelf for geodes -->
  <g transform="translate(340 130)">
    <rect x="0" y="0" width="150" height="22" fill="#4d3022"/>
    <rect x="12" y="-30" width="24" height="30" fill="#6f4a2f"/>
    <rect x="48" y="-44" width="24" height="44" fill="#7f5132"/>
    <rect x="88" y="-24" width="26" height="24" fill="#b68bd1"/>
    <rect x="122" y="-34" width="20" height="34" fill="#6f8f62"/>
  </g>

  <!-- wardrobe / chest -->
  <g transform="translate(470 390)">
    <rect x="0" y="0" width="160" height="210" fill="#4d3022"/>
    <rect x="14" y="18" width="60" height="176" fill="#6b422c"/>
    <rect x="86" y="18" width="60" height="176" fill="#6b422c"/>
    <circle cx="68" cy="106" r="6" fill="#d9a84f"/>
    <circle cx="92" cy="106" r="6" fill="#d9a84f"/>
  </g>

  <!-- candle glow -->
  <circle cx="1078" cy="348" r="82" fill="#ffd77e" opacity=".16"/>
  <circle cx="960" cy="370" r="58" fill="#ffd77e" opacity=".10"/>
</svg>