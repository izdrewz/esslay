  <!-- foreground plants -->
  <g stroke-linecap="round" opacity="0.72">
    <path d="M20 725 C40 660 55 640 80 600" stroke="#203b28" stroke-width="7"/>
    <path d="M120 725 C140 655 150 640 170 610" stroke="#2f5734" stroke-width="6"/>
