  <!-- lanterns -->
  <g>
    <g opacity="0.9"><circle cx="285" cy="525" r="44" fill="url(#lanternGlow)" filter="url(#soft)"/><rect x="273" y="505" width="24" height="37" rx="5" fill="#1b1511" stroke="#91632f"/><ellipse cx="285" cy="524" rx="8" ry="13" fill="#ffc96d"/></g>
    <g opacity="0.85"><circle cx="710" cy="520" r="42" fill="url(#lanternGlow)" filter="url(#soft)"/><rect x="698" y="500" width="24" height="37" rx="5" fill="#1b1511" stroke="#91632f"/><ellipse cx="710" cy="519" rx="8" ry="13" fill="#ffc96d"/></g>
    <g opacity="0.82"><circle cx="1005" cy="540" r="42" fill="url(#lanternGlow)" filter="url(#soft)"/><rect x="993" y="520" width="24" height="37" rx="5" fill="#1b1511" stroke="#91632f"/><ellipse cx="1005" cy="539" rx="8" ry="13" fill="#ffc96d"/></g>
