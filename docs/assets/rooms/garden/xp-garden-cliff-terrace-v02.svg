  <path d="M180 545 L600 490 L1005 515 L1180 585 L970 705 L245 720 L75 615 Z" fill="#30392d"/>
  <path d="M500 560 L640 510 L750 535 L815 720 L600 720 Z" fill="#4c463b" opacity="0.95"/>

