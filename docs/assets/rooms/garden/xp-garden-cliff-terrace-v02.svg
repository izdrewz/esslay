    <path d="M536 490 C570 462 605 430 650 388" stroke="#81593a" stroke-width="5" opacity="0.65"/>
    <path d="M535 475 C540 420 540 385 535 350" stroke="#81593a" stroke-width="5" opacity="0.65"/>
  </g>
  <g opacity="0.88">
    <circle cx="488" cy="420" r="36" fill="#4c8a62"/>
    <circle cx="530" cy="405" r="48" fill="#679d6d"/>
    <circle cx="590" cy="425" r="42" fill="#5f9469"/>
    <circle cx="455" cy="470" r="45" fill="#4d7c5e"/>
    <circle cx="545" cy="482" r="58" fill="#60946d"/>
