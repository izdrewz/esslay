    <polygon points="452,393 465,410 452,433 439,410"/>
    <polygon points="635,375 648,392 635,416 622,392"/>
    <polygon points="600,458 612,475 600,498 588,475"/>
  </g>

  <!-- garden objects -->
  <g>
    <rect x="330" y="600" width="110" height="32" rx="8" fill="#553220" stroke="#2d1e16"/>
    <rect x="900" y="570" width="120" height="32" rx="8" fill="#553220" stroke="#2d1e16"/>
    <rect x="190" y="610" width="100" height="30" rx="8" fill="#553220" stroke="#2d1e16"/>
