    <rect x="612" y="604" width="56" height="19" rx="5" fill="#867961"/>
    <rect x="474" y="632" width="58" height="20" rx="5" fill="#696354"/>
    <rect x="540" y="632" width="55" height="20" rx="5" fill="#77705c"/>
    <rect x="607" y="632" width="58" height="20" rx="5" fill="#5a5b50"/>
    <rect x="465" y="660" width="62" height="21" rx="5" fill="#83745d"/>
    <rect x="535" y="660" width="58" height="21" rx="5" fill="#5a5a50"/>
    <rect x="606" y="660" width="62" height="21" rx="5" fill="#706a58"/>
