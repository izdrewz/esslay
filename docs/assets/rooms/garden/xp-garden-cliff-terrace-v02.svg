<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Cliffside XP garden terrace with magical growth tree outside the mountain home">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fa8bd"/>
      <stop offset="0.55" stop-color="#556f82"/>
      <stop offset="1" stop-color="#253240"/>
    </linearGradient>
    <linearGradient id="parchmentGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6d98b" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#f6d98b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="treeGlow" cx="50%" cy="48%" r="55%">
      <stop offset="0" stop-color="#a6fff1" stop-opacity="0.42"/>
      <stop offset="0.45" stop-color="#7fc7ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lanternGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#ffc96d" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffc96d" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="multiply"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#sky)"/>
  <circle cx="72" cy="190" r="285" fill="url(#parchmentGlow)"/>
  <path d="M0 410 C120 335 215 345 345 420 C485 500 625 390 760 455 C930 535 1025 430 1280 520 L1280 720 L0 720 Z" fill="#223342" opacity="0.72"/>
  <path d="M0 460 C125 395 270 390 430 465 C575 532 725 455 890 505 C1050 548 1160 520 1280 575 L1280 720 L0 720 Z" fill="#192a35" opacity="0.84"/>

  <!-- massive mountain overhang -->
  <path d="M270 -90 L1320 -80 L1320 480 C1180 455 1105 420 1035 350 C960 275 870 235 735 205 C565 165 435 78 270 -90 Z" fill="#292929" opacity="0.96" filter="url(#rough)"/>
  <path d="M850 -20 L1320 -20 L1320 720 L1130 720 C1090 650 1065 590 1072 515 C1080 430 1010 368 980 285 C945 190 910 92 850 -20 Z" fill="#1d1f20" opacity="0.98"/>
  <path d="M365 55 C500 95 570 145 710 170 C855 198 985 270 1070 385" fill="none" stroke="#4e4b44" stroke-width="28" stroke-linecap="round" opacity="0.25"/>
  <path d="M920 70 C965 170 980 250 1045 340 C1090 405 1080 505 1125 625" fill="none" stroke="#54504a" stroke-width="34" stroke-linecap="round" opacity="0.18"/>

