  <g opacity="0.88">
    <rect x="508" y="548" width="54" height="19" rx="5" fill="#6f6755"/>
    <rect x="565" y="548" width="52" height="19" rx="5" fill="#56584e"/>
    <rect x="622" y="548" width="54" height="19" rx="5" fill="#756c58"/>
