<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Edit room placeholder</title>
  <desc id="desc">Cosy fantasy scholar planning room placeholder with mood board, desk, source shelf, and scrap chest.</desc>
  <defs>
    <linearGradient id="wall" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d7b78d"/>
      <stop offset="1" stop-color="#a97955"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" x2="1">
      <stop offset="0" stop-color="#5a3422"/>
      <stop offset="1" stop-color="#8b5a35"/>
    </linearGradient>
    <pattern id="plaster" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="rgba(255,255,255,0)"/>
      <path d="M6 20 C30 5, 48 35, 76 16 M8 60 C34 44, 50 74, 78 55" fill="none" stroke="#8b6647" stroke-opacity=".18" stroke-width="4"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#2b1d17"/>
  <rect x="0" y="0" width="1600" height="620" fill="url(#wall)"/>
  <rect x="0" y="0" width="1600" height="620" fill="url(#plaster)"/>
  <path d="M0 620 L1600 590 L1600 900 L0 900 Z" fill="url(#floor)"/>
  <path d="M0 620 L1600 590" stroke="#3f261a" stroke-width="12"/>

  <rect x="20" y="130" width="220" height="560" rx="20" fill="#5f3b27" stroke="#2b1d17" stroke-width="12"/>
  <rect x="58" y="180" width="144" height="460" rx="12" fill="#8d5c37" stroke="#2b1d17" stroke-width="8"/>
