    <rect x="580" y="140" width="150" height="88" rx="12" fill="#fff4df" stroke="#5f3b27" stroke-width="5"/>
    <text x="655" y="192" text-anchor="middle">keywords</text>
    <rect x="765" y="132" width="170" height="100" rx="12" fill="#e8b8c0" stroke="#5f3b27" stroke-width="5"/>
    <text x="850" y="190" text-anchor="middle">swatches</text>
    <rect x="960" y="154" width="120" height="140" rx="12" fill="#d9e0bc" stroke="#5f3b27" stroke-width="5"/>
    <text x="1020" y="228" text-anchor="middle">map</text>
    <rect x="620" y="270" width="230" height="95" rx="12" fill="#f3dfbd" stroke="#5f3b27" stroke-width="5"/>
