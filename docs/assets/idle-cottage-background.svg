    <rect x="504" y="32" width="90" height="24" fill="#776d59" stroke="#4c453a" stroke-width="6"/>
    <rect x="590" y="62" width="42" height="118" fill="url(#stone)" stroke="#4c453a" stroke-width="8"/>
