      <path d="M410 188v42M376 210h68" stroke="#4b3325" stroke-width="6"/>
      <rect x="348" y="166" width="124" height="14" fill="#704a31"/>
      <rect x="352" y="240" width="116" height="16" fill="#704a31"/>
