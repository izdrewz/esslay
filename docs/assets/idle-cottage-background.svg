  <!-- fence and path foreground -->
  <path d="M532 604c42-64 114-80 176 0 36 46 42 78 44 116H458c4-40 26-76 74-116z" fill="#d7c7a8" opacity=".9"/>
  <path d="M572 626c34-22 80-20 122 0M530 666c72-18 144-18 214 0" stroke="#b6a17e" stroke-width="6" fill="none"/>
  <g fill="#704a31" stroke="#422a1e" stroke-width="4">
    <rect x="72" y="580" width="18" height="78"/><rect x="118" y="572" width="18" height="86"/><rect x="164" y="584" width="18" height="74"/><rect x="1016" y="580" width="18" height="78"/><rect x="1062" y="572" width="18" height="86"/><rect x="1108" y="584" width="18" height="74"/>
