      <rect x="224" y="368" width="66" height="48" fill="#9ec7d8"/>
      <path d="M257 368v48M224 392h66" stroke="#4b3325" stroke-width="7"/>
      <rect x="200" y="344" width="114" height="14" fill="#704a31"/>
      <rect x="202" y="426" width="112" height="18" fill="#704a31"/>
      <path d="M214 438c22-28 68-28 92 0" stroke="#547447" stroke-width="16" fill="none"/>
    </g>
    <g>
      <rect x="508" y="354" width="104" height="78" fill="#4b3325"/>
      <rect x="524" y="370" width="72" height="50" fill="#9ec7d8"/>
      <path d="M560 370v50M524 396h72" stroke="#4b3325" stroke-width="7"/>
