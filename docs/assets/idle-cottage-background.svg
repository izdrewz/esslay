<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3e8cf"/>
      <stop offset="0.52" stop-color="#efe3c7"/>
      <stop offset="0.53" stop-color="#99b873"/>
      <stop offset="1" stop-color="#587444"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7b4b31"/>
      <stop offset="1" stop-color="#3d271c"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3d4b7"/>
      <stop offset="1" stop-color="#b9a17a"/>
    </linearGradient>
    <pattern id="tiles" width="42" height="28" patternUnits="userSpaceOnUse">
      <rect width="42" height="28" fill="#6b402b"/>
      <path d="M0 25h42M0 5q21 10 42 0" stroke="#3f271d" stroke-width="3" fill="none" opacity=".7"/>
      <path d="M21 5v20" stroke="#8e5c39" stroke-width="2" opacity=".5"/>
    </pattern>
    <pattern id="stone" width="54" height="36" patternUnits="userSpaceOnUse">
      <rect width="54" height="36" fill="#9b9078"/>
      <path d="M0 34h54M28 0v34" stroke="#6f6756" stroke-width="3" opacity=".55"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="url(#sky)"/>
  <circle cx="1078" cy="92" r="48" fill="#efd078" opacity=".78"/>
  <path d="M0 610c130-36 240-28 370-12 126 16 238 12 364-6 158-22 334-10 546 18v110H0z" fill="#496c42" opacity=".48"/>
  <path d="M0 640c160-48 320-26 472-16 210 14 432-30 808 6v90H0z" fill="#3d5e37" opacity=".45"/>

