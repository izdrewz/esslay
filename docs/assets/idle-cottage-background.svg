    <rect x="378" y="414" width="60" height="120" rx="28" fill="#74482e"/>
    <path d="M408 414v120" stroke="#4c2e20" stroke-width="5"/>
    <circle cx="428" cy="476" r="6" fill="#e0b35f"/>
    <path d="M356 536h108l26 24H330zM330 560h160l32 24H300z" fill="#b9aa8e" stroke="#675d4f" stroke-width="4"/>

    <!-- vines and garden -->
    <path d="M250 336c10-62 50-118 116-150M550 360c22-58 66-94 132-104M176 500c70-54 160-50 224-14M470 504c68-50 156-48 220-6" stroke="#49663e" stroke-width="14" fill="none" opacity=".86"/>
    <g fill="#6d874e">
      <circle cx="266" cy="316" r="18"/><circle cx="302" cy="268" r="16"/><circle cx="350" cy="214" r="18"/><circle cx="542" cy="344" r="18"/><circle cx="584" cy="300" r="16"/><circle cx="638" cy="268" r="19"/>
      <circle cx="182" cy="496" r="30"/><circle cx="232" cy="484" r="28"/><circle cx="294" cy="496" r="30"/><circle cx="548" cy="500" r="32"/><circle cx="614" cy="488" r="30"/><circle cx="672" cy="500" r="34"/>
    </g>
    <g fill="#f2d6d3" opacity=".9">
      <circle cx="230" cy="452" r="5"/><circle cx="278" cy="462" r="5"/><circle cx="586" cy="454" r="5"/><circle cx="638" cy="456" r="5"/><circle cx="364" cy="202" r="5"/><circle cx="650" cy="274" r="5"/>
