    <circle cx="1120" cy="430" r="84"/><circle cx="1200" cy="430" r="70"/><circle cx="1168" cy="372" r="78"/>
    <circle cx="230" cy="455" r="52"/><circle cx="1010" cy="462" r="58"/>
  </g>

  <!-- left tree -->
  <g transform="translate(48 118)">
    <path d="M96 510c-14-154-10-270 32-420l44 8c-36 130-34 260-10 416z" fill="#5d4934"/>
    <path d="M130 118c-82 28-108 84-96 150 18 90 124 104 194 62 86-52 72-170-12-210-28-14-58-14-86-2z" fill="#9a9b68"/>
    <path d="M70 188c-40 36-44 98-8 134 36 36 100 28 132-12 34-42 18-110-28-136-36-20-70-12-96 14z" fill="#7f8a58" opacity=".72"/>
    <path d="M176 170c42 18 70 62 62 108-8 50-62 82-114 64 42-42 56-98 52-172z" fill="#686f47" opacity=".45"/>
