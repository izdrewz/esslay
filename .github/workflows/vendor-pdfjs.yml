name: Vendor pinned PDF.js

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/vendor-pdfjs.yml"

permissions:
  contents: write

jobs:
  vendor-pdfjs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download pinned PDF.js distribution
        run: |
          set -euo pipefail
          rm -rf .pdfjs-package
          mkdir -p .pdfjs-package docs/assets/vendor/pdfjs
          npm pack pdfjs-dist@4.10.38 --pack-destination .pdfjs-package
          tar -xzf .pdfjs-package/pdfjs-dist-4.10.38.tgz -C .pdfjs-package
          cp .pdfjs-package/package/build/pdf.mjs docs/assets/vendor/pdfjs/pdf.mjs
          cp .pdfjs-package/package/build/pdf.worker.mjs docs/assets/vendor/pdfjs/pdf.worker.mjs

      - name: Commit local PDF.js files when changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/vendor/pdfjs/pdf.mjs docs/assets/vendor/pdfjs/pdf.worker.mjs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Vendor PDF.js 4.10.38"
          git push
